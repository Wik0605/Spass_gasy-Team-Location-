<div id="car-images-{{ car.id }}">
    {% if car.images %}
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-2 mb-3">
        {% for img in car.images %}
        <div class="relative group rounded-lg overflow-hidden bg-gray-100 aspect-video">
            <img src="{{ img.url }}" alt="photo {{ loop.index }}"
                class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                <form hx-post="/admin/cars/{{ car.id }}/images/{{ img.id }}/delete"
                      hx-target="#car-images-{{ car.id }}"
                      hx-swap="outerHTML">
                    <button type="submit"
                        class="bg-red-600 text-white text-xs font-semibold px-3 py-1.5 rounded-lg hover:bg-red-700 transition-colors">
                        Supprimer
                    </button>
                </form>
            </div>
            {% if loop.first %}
            <span class="absolute top-1 left-1 bg-indigo-600 text-white text-xs px-1.5 py-0.5 rounded font-medium">
                Principale
            </span>
            {% endif %}
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p class="text-xs text-gray-400 italic mb-3">Aucune photo ajoutée</p>
    {% endif %}
</div>

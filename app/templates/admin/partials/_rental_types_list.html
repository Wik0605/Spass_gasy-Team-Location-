<div id="rental-types-list" class="space-y-3">
    {% for rt in rental_types %}
    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
        <div class="flex items-center justify-between mb-3">
            <h3 class="font-bold text-gray-900">{{ rt.name }}</h3>
            <form hx-post="/admin/rental-types/{{ rt.id }}/delete"
                  hx-target="#rental-types-list"
                  hx-swap="outerHTML"
                  hx-confirm="Supprimer ce type de location ?">
                <button type="submit" class="text-xs text-red-400 hover:text-red-600 font-medium">Supprimer</button>
            </form>
        </div>
        <form hx-post="/admin/rental-types/{{ rt.id }}/edit"
              hx-target="#rental-types-list"
              hx-swap="outerHTML"
              class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-xs text-gray-500 mb-1">Nom</label>
                <input type="text" name="name" value="{{ rt.name }}" required
                    class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Durée (jours)</label>
                <input type="number" name="duration_days" value="{{ rt.duration_days }}" min="1" required
                    class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Multiplicateur prix</label>
                <input type="number" name="price_multiplier" value="{{ rt.price_multiplier }}" step="0.1" min="0" required
                    class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Remise (%)</label>
                <input type="number" name="discount_percent" value="{{ rt.discount_percent }}" step="0.5" min="0" max="100"
                    class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
            </div>
            <div class="col-span-2">
                <label class="block text-xs text-gray-500 mb-1">Description</label>
                <input type="text" name="description" value="{{ rt.description or '' }}"
                    class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
            </div>
            <div class="col-span-2">
                <button type="submit"
                    class="w-full bg-indigo-600 text-white text-sm py-2 rounded-lg font-semibold hover:bg-indigo-700 transition-colors">
                    Enregistrer
                </button>
            </div>
        </form>
    </div>
    {% else %}
    <p class="text-gray-400 text-sm py-4">Aucun type de location configuré.</p>
    {% endfor %}
</div>

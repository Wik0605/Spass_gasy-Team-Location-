{% extends "admin/base_admin.html" %}
{% set active = "cars" %}

{% block title %}Voitures{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-xl lg:text-2xl font-bold text-gray-900">Voitures</h1>
    <button onclick="document.getElementById('add-car-panel').classList.toggle('hidden')"
        class="bg-indigo-600 text-white text-sm font-semibold px-4 py-2 rounded-xl hover:bg-indigo-700 transition-colors">
        + Ajouter une voiture
    </button>
</div>

<!-- Formulaire ajout -->
<div id="add-car-panel" class="hidden mb-8 bg-white rounded-xl border border-gray-100 shadow-sm p-6">
    <h2 class="font-bold text-gray-800 mb-4">Nouvelle voiture</h2>
    <form hx-post="/admin/cars/create"
          hx-target="#cars-grid"
          hx-swap="outerHTML"
          hx-on::after-request="if(event.detail.successful){ document.getElementById('add-car-panel').classList.add('hidden'); this.reset(); }"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <div>
            <label class="block text-xs text-gray-500 mb-1">Marque *</label>
            <input type="text" name="brand" required placeholder="Toyota"
                class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1">Modèle *</label>
            <input type="text" name="model" required placeholder="Yaris"
                class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1">Année *</label>
            <input type="number" name="year" required placeholder="2023" min="1990" max="2030"
                class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1">Immatriculation *</label>
            <input type="text" name="plate_number" required placeholder="1234 TANA"
                class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1">Prix/jour (Ar) *</label>
            <input type="number" name="daily_price" required placeholder="25000" min="0"
                class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1">Places</label>
            <input type="number" name="seats" value="5" min="1" max="20"
                class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1">Consommation (L/100km)</label>
            <input type="number" name="fuel_consumption" value="8.0" step="0.1" min="1"
                class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
        </div>
        <div class="sm:col-span-2 lg:col-span-2">
            <label class="block text-xs text-gray-500 mb-1">Description</label>
            <input type="text" name="description" placeholder="Description courte du véhicule"
                class="w-full text-sm border border-gray-200 rounded-lg px-3 py-2">
        </div>
        <div class="sm:col-span-2 lg:col-span-3 flex gap-3 pt-2">
            <button type="submit"
                class="bg-emerald-600 text-white text-sm font-semibold px-6 py-2 rounded-lg hover:bg-emerald-700 transition-colors">
                Créer la voiture
            </button>
            <button type="button"
                onclick="document.getElementById('add-car-panel').classList.add('hidden'); this.form.reset()"
                class="text-sm text-gray-500 hover:text-gray-700 font-medium px-4 py-2">
                Annuler
            </button>
        </div>
    </form>
</div>

{% include "admin/partials/_cars_grid.html" %}
{% endblock %}
